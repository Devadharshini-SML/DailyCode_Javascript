<p>Number 1 : <input id="num 1" placeholder="Enter Number one"></p>
<p>Number 2 : <input id="num 2" placeholder="Enter Number two"></p>
<button onclick="resultfunction()">Add</button>
<p>Result : <p id="result"></p></p>

<script>
    var box1=document.getElementById("num 1")
    var box2=document.getElementById("num 2")
    var result=document.getElementById("result")

    

    function resultfunction(){
    var box1value=Number(box1.value)
    var box2value=Number(box2.value)
    var total=box1value+box2value
        result.textContent=total
    }
</script>
